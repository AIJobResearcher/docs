name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install markdownlint-cli2 locally
        run: npm install markdownlint-cli2 --save-dev

      - name: Lint Markdown files
        run: npx markdownlint-cli2 "docs/**/*.md" --config .markdownlint.json

  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config ./lychee.toml ./docs ./**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: sudo apt-get update && sudo apt-get install -y yamllint

      - name: Validate YAML files
        run: yamllint -c .yamllint.yaml .

  bdd-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install cucumber-js locally
        run: npm install @cucumber/cucumber --save-dev

      - name: Check Gherkin feature files syntax
        run: npx cucumber-js --config cucumber.js --format json
