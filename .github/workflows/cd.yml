name: CD

on:
  push:
    branches: [ main ]
    paths:
      - 'deploy/**'
      - 'docs/**'
      - '.github/workflows/cd.yml'

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify Kubernetes connection
        run: kubectl cluster-info

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml || true
          kubectl apply -f deploy/k8s/

      - name: Wait for deployments to be ready
        run: |
          kubectl wait --for=condition=available --timeout=300s deployment --all -n ai-job-researcher || true

  update-documentation:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy documentation to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: ./
          keep_files: false

  notify-status:
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, update-documentation]
    if: always()
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy-infrastructure.result }}" = "success" ] && [ "${{ needs.update-documentation.result }}" = "success" ]; then
            echo "✅ Deployment completed successfully!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi